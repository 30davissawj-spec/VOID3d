<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Void3D — Game Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0f12;
    --panel:    #13161b;
    --border:   #1f2530;
    --accent:   #4ade80;
    --accent2:  #38bdf8;
    --text:     #c9d1e0;
    --muted:    #4a5568;
    --danger:   #f87171;
    --warn:     #fbbf24;
    --bar:      #0a0c0f;
  }

  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; }

  /* ── TOP BAR ── */
  #topbar {
    height: 42px;
    background: var(--bar);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 16px;
    flex-shrink: 0;
    z-index: 100;
  }
  #topbar .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 16px;
    color: var(--accent);
    letter-spacing: 1px;
    margin-right: 8px;
  }
  .tbtn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 5px;
    padding: 4px 12px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tbtn:hover { background: var(--border); color: #fff; }
  .tbtn.green { border-color: var(--accent); color: var(--accent); }
  .tbtn.green:hover { background: var(--accent); color: #000; }
  .tbtn.blue  { border-color: var(--accent2); color: var(--accent2); }
  .tbtn.blue:hover  { background: var(--accent2); color: #000; }
  .tbtn.red   { border-color: var(--danger); color: var(--danger); }
  .tbtn.red:hover   { background: var(--danger); color: #000; }

  #topbar .spacer { flex: 1; }
  #topbar .status { font-size: 11px; color: var(--muted); }

  /* ── LAYOUT ── */
  #layout {
    display: flex;
    height: calc(100vh - 42px);
  }

  /* ── EDITOR PANEL ── */
  #editorPanel {
    display: flex;
    flex-direction: column;
    width: 50%;
    min-width: 200px;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }

  #editorHeader {
    height: 32px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 11px;
    color: var(--muted);
    gap: 8px;
    flex-shrink: 0;
  }
  #editorHeader .tab {
    color: var(--accent);
    font-size: 11px;
    border-bottom: 1px solid var(--accent);
    padding-bottom: 1px;
  }

  #editorWrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  /* Line numbers */
  #lineNums {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 44px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 10px 0;
    overflow: hidden;
    user-select: none;
    z-index: 2;
  }
  #lineNums .ln {
    display: block;
    text-align: right;
    padding-right: 8px;
    font-size: 12px;
    line-height: 20px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  #editor {
    position: absolute;
    top: 0; left: 44px; right: 0; bottom: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 20px;
    padding: 10px 12px;
    border: none;
    outline: none;
    resize: none;
    tab-size: 2;
    overflow-y: scroll;
    overflow-x: auto;
    white-space: pre;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    spellcheck: false;
  }
  #editor::selection { background: rgba(74,222,128,0.18); }

  /* ── CONSOLE ── */
  #consolePanel {
    height: 130px;
    background: var(--bar);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  #consoleHeader {
    height: 28px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #consoleHeader span { color: var(--warn); }
  #consoleClear {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
  }
  #consoleClear:hover { color: var(--text); }
  #consoleLog {
    flex: 1;
    overflow-y: auto;
    padding: 6px 12px;
    font-size: 11px;
    line-height: 1.7;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .log-info  { color: var(--text); }
  .log-warn  { color: var(--warn); }
  .log-error { color: var(--danger); }
  .log-ok    { color: var(--accent); }

  /* ── PREVIEW PANEL ── */
  #previewPanel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #previewHeader {
    height: 32px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 11px;
    color: var(--muted);
    gap: 8px;
    flex-shrink: 0;
  }
  #previewHeader .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); display: inline-block; }
  #previewHeader .dot.green { background: var(--accent); }

  #previewWrap {
    flex: 1;
    position: relative;
    background: #000;
    overflow: hidden;
  }

  #preview {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    background: #000;
  }

  /* Pointer lock overlay shown over preview when not running */
  #plockNotice {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.82);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text);
    font-size: 13px;
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.3s;
  }
  #plockNotice.hidden { opacity: 0; }
  #plockNotice .icon { font-size: 32px; }
  #plockNotice .sub { font-size: 11px; color: var(--muted); }

  /* Resize handle */
  #resizer {
    width: 5px;
    background: var(--border);
    cursor: col-resize;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  #resizer:hover, #resizer.dragging { background: var(--accent); }

  /* Splitter for editor/console */
  #editorConsoleResizer {
    height: 4px;
    background: var(--border);
    cursor: row-resize;
    flex-shrink: 0;
  }
  #editorConsoleResizer:hover { background: var(--accent2); }

  /* Scroll sync */
  #editor::-webkit-scrollbar { width: 6px; }
  #editor::-webkit-scrollbar-track { background: transparent; }
  #editor::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Template picker */
  #templateBar {
    height: 28px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 6px;
    flex-shrink: 0;
    overflow-x: auto;
  }
  #templateBar .tlabel { font-size: 10px; color: var(--muted); margin-right: 2px; white-space: nowrap; }
  .tpill {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.12s;
  }
  .tpill:hover { border-color: var(--accent2); color: var(--accent2); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo">⬡ VOID3D</div>
  <button class="tbtn green" id="btnRun">▶ Run</button>
  <button class="tbtn red"   id="btnStop">■ Stop</button>
  <button class="tbtn blue"  id="btnFormat">⌥ Format</button>
  <div class="spacer"></div>
  <div class="status" id="statusText">Ready — click ▶ Run to launch your game</div>
</div>

<!-- LAYOUT -->
<div id="layout">

  <!-- EDITOR PANEL -->
  <div id="editorPanel">
    <div id="editorHeader">
      <span class="tab">main.js</span>
      <span style="margin-left:auto;font-size:10px;" id="cursorPos">Ln 1, Col 1</span>
    </div>
    <div id="templateBar">
      <span class="tlabel">Templates:</span>
      <button class="tpill" data-tpl="blank">Blank</button>
      <button class="tpill" data-tpl="hello">Hello World</button>
      <button class="tpill" data-tpl="threejs">Three.js Scene</button>
      <button class="tpill" data-tpl="pointerlock">Pointer Lock Demo</button>
    </div>
    <div id="editorWrap">
      <div id="lineNums"></div>
      <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    </div>
    <div id="editorConsoleResizer"></div>
    <div id="consolePanel">
      <div id="consoleHeader">
        <span>▸ Console</span>
        <button id="consoleClear">clear</button>
      </div>
      <div id="consoleLog"></div>
    </div>
  </div>

  <!-- RESIZE HANDLE -->
  <div id="resizer"></div>

  <!-- PREVIEW PANEL -->
  <div id="previewPanel">
    <div id="previewHeader">
      <span class="dot" id="previewDot"></span>
      <span id="previewLabel">Preview — stopped</span>
    </div>
    <div id="previewWrap">
      <iframe id="preview" sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-modals"></iframe>
      <div id="plockNotice">
        <div class="icon">🎮</div>
        <div>Click <b style="color:#4ade80">▶ Run</b> to start your game</div>
        <div class="sub">Pointer lock & full controls supported</div>
      </div>
    </div>
  </div>

</div>

<script>
// ── TEMPLATES ──
const TEMPLATES = {
  blank: `// Write your JavaScript here
// Three.js r128 is available as THREE
// The canvas is already added to the page

`,

  hello: `const div = document.createElement('div');
div.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0d0f12;color:#4ade80;font-family:monospace;font-size:32px;font-weight:bold;';
div.textContent = 'Hello, Void3D!';
document.body.appendChild(div);
`,

  threejs: `// Basic Three.js rotating cube
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111827);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.style.margin = '0';
document.body.appendChild(renderer.domElement);

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

const mesh = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshNormalMaterial()
);
scene.add(mesh);

function animate() {
  requestAnimationFrame(animate);
  mesh.rotation.x += 0.01;
  mesh.rotation.y += 0.013;
  renderer.render(scene, camera);
}
animate();
`,

  pointerlock: `// Pointer Lock demo — click to capture mouse
document.body.style.cssText = 'margin:0;overflow:hidden;background:#0d0f12;font-family:monospace;color:#fff;';

const info = document.createElement('div');
info.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);font-size:14px;color:#4ade80;text-align:center;';
info.textContent = 'Click anywhere to lock mouse';
document.body.appendChild(info);

const dot = document.createElement('div');
dot.style.cssText = 'position:fixed;top:50%;left:50%;width:10px;height:10px;background:#4ade80;border-radius:50%;transform:translate(-50%,-50%);';
document.body.appendChild(dot);

let x = innerWidth/2, y = innerHeight/2;

document.body.addEventListener('click', () => document.body.requestPointerLock());

document.addEventListener('pointerlockchange', () => {
  if (document.pointerLockElement === document.body) {
    info.textContent = 'Mouse locked! Move around. Press Esc to unlock.';
  } else {
    info.textContent = 'Click anywhere to lock mouse';
  }
});

document.addEventListener('mousemove', e => {
  if (document.pointerLockElement !== document.body) return;
  x += e.movementX;
  y += e.movementY;
  x = Math.max(0, Math.min(innerWidth, x));
  y = Math.max(0, Math.min(innerHeight, y));
  dot.style.left = x + 'px';
  dot.style.top  = y + 'px';
});
`
};

// ── EDITOR SETUP ──
const editorEl   = document.getElementById('editor');
const lineNumsEl = document.getElementById('lineNums');
const consoleLog = document.getElementById('consoleLog');
const statusText = document.getElementById('statusText');
const previewDot = document.getElementById('previewDot');
const previewLabel = document.getElementById('previewLabel');
const plockNotice = document.getElementById('plockNotice');
const preview    = document.getElementById('preview');
const cursorPos  = document.getElementById('cursorPos');

// Load saved code or default to voxelcraft hint
const saved = localStorage.getItem('void3d_code');
editorEl.value = saved || TEMPLATES.threejs;

// ── LINE NUMBERS ──
function updateLineNums() {
  const lines = editorEl.value.split('\n');
  lineNumsEl.innerHTML = lines.map((_,i) =>
    `<span class="ln">${i+1}</span>`
  ).join('');
  // Sync scroll
  lineNumsEl.scrollTop = editorEl.scrollTop;
}
updateLineNums();

editorEl.addEventListener('input', () => {
  updateLineNums();
  localStorage.setItem('void3d_code', editorEl.value);
});
editorEl.addEventListener('scroll', () => {
  lineNumsEl.scrollTop = editorEl.scrollTop;
});
editorEl.addEventListener('keyup', updateCursor);
editorEl.addEventListener('click', updateCursor);
editorEl.addEventListener('keydown', e => {
  // Tab key inserts spaces
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editorEl.selectionStart;
    const v = editorEl.value;
    editorEl.value = v.slice(0,s) + '  ' + v.slice(editorEl.selectionEnd);
    editorEl.selectionStart = editorEl.selectionEnd = s + 2;
    updateLineNums();
  }
});

function updateCursor() {
  const txt = editorEl.value.slice(0, editorEl.selectionStart);
  const lines = txt.split('\n');
  cursorPos.textContent = `Ln ${lines.length}, Col ${lines[lines.length-1].length+1}`;
}

// ── TEMPLATES ──
document.querySelectorAll('.tpill').forEach(btn => {
  btn.addEventListener('click', () => {
    const tpl = btn.dataset.tpl;
    if (TEMPLATES[tpl] !== undefined) {
      editorEl.value = TEMPLATES[tpl];
      updateLineNums();
      localStorage.setItem('void3d_code', editorEl.value);
      logMsg('Template loaded: '+tpl, 'info');
    }
  });
});

// ── CONSOLE ──
function logMsg(msg, type='info') {
  const div = document.createElement('div');
  div.className = 'log-'+type;
  div.textContent = '['+new Date().toLocaleTimeString()+'] '+msg;
  consoleLog.appendChild(div);
  consoleLog.scrollTop = consoleLog.scrollHeight;
}
document.getElementById('consoleClear').onclick = () => consoleLog.innerHTML = '';

// ── RUN ──
let running = false;

document.getElementById('btnRun').onclick = () => {
  const code = editorEl.value.trim();
  if (!code) { logMsg('Nothing to run.', 'warn'); return; }

  logMsg('Starting...', 'ok');
  running = true;
  previewDot.classList.add('green');
  previewLabel.textContent = 'Preview — running';
  statusText.textContent = 'Running — click the preview to capture mouse';
  plockNotice.classList.add('hidden');

  // Build the iframe HTML — includes Three.js and intercepts console
  const html = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { overflow:hidden; background:#000; }
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"><\/script>
<script>
// Forward console to parent
(function(){
  const send = (type, args) => {
    try {
      parent.postMessage({type:'console', level:type, msg: args.map(a=>{
        try { return typeof a === 'object' ? JSON.stringify(a) : String(a); } catch(e){ return String(a); }
      }).join(' ')}, '*');
    } catch(e){}
  };
  const orig = {log:console.log, warn:console.warn, error:console.error};
  console.log   = (...a) => { orig.log(...a);   send('info', a); };
  console.warn  = (...a) => { orig.warn(...a);  send('warn', a); };
  console.error = (...a) => { orig.error(...a); send('error', a); };
  window.addEventListener('error', e => send('error', [e.message + ' (line '+e.lineno+')']));
})();
<\/script>
<script>
try {
${code}
} catch(e) {
  console.error('Runtime error: ' + e.message);
  document.body.style.cssText='display:flex;align-items:center;justify-content:center;height:100vh;background:#0d0f12;color:#f87171;font-family:monospace;font-size:14px;padding:20px;text-align:center;';
  document.body.textContent = '❌ ' + e.message;
}
<\/script>
</body>
</html>`;

  const blob = new Blob([html], {type:'text/html'});
  const url  = URL.createObjectURL(blob);
  preview.src = url;
  setTimeout(() => URL.revokeObjectURL(url), 5000);
};

// ── STOP ──
document.getElementById('btnStop').onclick = () => {
  preview.src = 'about:blank';
  running = false;
  previewDot.classList.remove('green');
  previewLabel.textContent = 'Preview — stopped';
  statusText.textContent = 'Stopped';
  plockNotice.classList.remove('hidden');
  logMsg('Stopped.', 'warn');
};

// ── FORMAT (basic indent) ──
document.getElementById('btnFormat').onclick = () => {
  try {
    logMsg('Format: basic cleanup applied.', 'info');
    // Simple: normalize line endings, trim trailing spaces
    editorEl.value = editorEl.value
      .split('\n')
      .map(l => l.trimEnd())
      .join('\n');
    updateLineNums();
  } catch(e) {
    logMsg('Format error: '+e.message, 'error');
  }
};

// ── CONSOLE MESSAGES FROM IFRAME ──
addEventListener('message', e => {
  if (e.data && e.data.type === 'console') {
    logMsg(e.data.msg, e.data.level);
  }
});

// ── RESIZE HANDLE (left/right panels) ──
const resizer = document.getElementById('resizer');
const editorPanel = document.getElementById('editorPanel');
let resizing = false;

resizer.addEventListener('mousedown', e => {
  resizing = true;
  resizer.classList.add('dragging');
  e.preventDefault();
});
addEventListener('mousemove', e => {
  if (!resizing) return;
  const layout = document.getElementById('layout');
  const rect = layout.getBoundingClientRect();
  let w = e.clientX - rect.left;
  w = Math.max(250, Math.min(rect.width - 250, w));
  editorPanel.style.width = w + 'px';
});
addEventListener('mouseup', () => {
  resizing = false;
  resizer.classList.remove('dragging');
});

// ── CONSOLE/EDITOR RESIZE ──
const ecr = document.getElementById('editorConsoleResizer');
const consolePanel = document.getElementById('consolePanel');
let ecrDragging = false;

ecr.addEventListener('mousedown', e => { ecrDragging = true; e.preventDefault(); });
addEventListener('mousemove', e => {
  if (!ecrDragging) return;
  const epRect = editorPanel.getBoundingClientRect();
  let ch = epRect.bottom - e.clientY;
  ch = Math.max(60, Math.min(300, ch));
  consolePanel.style.height = ch + 'px';
});
addEventListener('mouseup', () => ecrDragging = false);

// ── KEYBOARD SHORTCUT: Ctrl+Enter to run ──
addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('btnRun').click();
  }
});

logMsg('Void3D ready. Ctrl+Enter to run.', 'ok');
logMsg('Tip: pointer lock works inside the preview — click your game to capture the mouse.', 'info');
</script>
</body>
</html>
